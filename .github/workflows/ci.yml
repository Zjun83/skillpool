name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/
      - name: MyPy
        run: mypy src/skillpool --ignore-missing-imports || true

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: pip install -e ".[dev,graph]"
      - name: Run tests with coverage
        run: pytest --cov=skillpool --cov-branch --cov-fail-under=85 -n auto -o "addopts="
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  schema-validation:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]" pyyaml jsonschema
      - name: Validate CSDF schemas
        run: |
          python -c "
          import yaml, json, pathlib
          skills_dir = pathlib.Path.home() / '.skillpool' / 'skills'
          # Validate all YAML files parse correctly
          for yf in pathlib.Path('src').rglob('*.yaml'):
              try:
                  data = yaml.safe_load(yf.read_text())
                  assert isinstance(data, dict), f'{yf}: not a dict'
              except Exception as e:
                  print(f'FAIL: {yf}: {e}')
                  raise
          print('Schema validation passed')
          "

  sbom:
    runs-on: ubuntu-latest
    needs: [test, schema-validation]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Generate SBOM
        run: python scripts/gen_sbom.py sbom.json
      - name: Sign SBOM
        run: python scripts/sign_artifact.py sbom.json --keyless
        continue-on-error: true
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 30

  docs-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Build docs
        run: |
          # Verify all markdown references are valid
          python -c "
          import pathlib, re
          errors = []
          for md in pathlib.Path('.').rglob('*.md'):
              if '.git' in str(md) or 'node_modules' in str(md):
                  continue
              content = md.read_text(errors='ignore')
              # Check for broken internal links [text](./path)
              for match in re.finditer(r'\[([^\]]+)\]\(([^)]+)\)', content):
                  link = match.group(2)
                  if link.startswith(('http', '#', 'mailto', 'skill://')):
                      continue
                  target = md.parent / link.split('#')[0]
                  if not target.exists():
                      errors.append(f'{md}:{link} -> not found')
          if errors:
              print('Broken links:')
              for e in errors[:20]:
                  print(f'  {e}')
          else:
              print('All markdown links valid')
          "

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: pip-audit
        run: pip-audit --desc || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, security, schema-validation, sbom]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tool
        run: pip install build setuptools wheel
      - name: Build package
        run: python -m build
      - name: Verify wheel contents
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          python -c "import zipfile; zf = zipfile.ZipFile('$WHEEL'); print([n for n in zf.namelist() if 'skillpool' in n][:10])"
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
