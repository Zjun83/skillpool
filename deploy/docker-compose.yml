# ── SkillPool V4.1 Docker Compose ────────────────────────────────
# docker compose -f deploy/docker-compose.yml up -d
# ──────────────────────────────────────────────────────────────────

services:
  skillpool:
    build:
      context: ../
      dockerfile: deploy/Dockerfile
    image: skillpool:4.3.0
    container_name: skillpool
    restart: unless-stopped
    ports:
      - "8101:8101"
    environment:
      SKILLPOOL_HOST: "0.0.0.0"
      SKILLPOOL_PORT: "8101"
      SKILLPOOL_DATA_DIR: "/data"
      SKILLPOOL_LOG_LEVEL: "INFO"
    volumes:
      - skillpool-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8101/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  skillpool-data:
    driver: local
